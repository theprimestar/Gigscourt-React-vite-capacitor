name: Build iOS (Unsigned IPA for ESign)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor iOS
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Add iOS Permission Strings
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'GigsCourt needs your location to show nearby service providers.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'GigsCourt needs camera access for profile picture uploads.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'GigsCourt needs photo library access for profile picture and work photo uploads.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'GigsCourt needs to save photos to your library.'" "$PLIST"

      - name: Build unsigned IPA
        run: |
          cd ios/App
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r GigsCourt-iOS-Unsigned.ipa Payload/
          mkdir -p output
          mv GigsCourt-iOS-Unsigned.ipa output/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: gigscourt-ios-unsigned
          path: output/GigsCourt-iOS-Unsigned.ipa
          retention-days: 30
